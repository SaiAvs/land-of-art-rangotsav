/* ================= HERO ================= */
function Hero(){
  const [ripples,setRipples] = React.useState([]);

  function handleClick(e){
    const id = Date.now();
    const rect = e.currentTarget.getBoundingClientRect();

    setRipples(r=>[
      ...r,
      {id,x:e.clientX-rect.left,y:e.clientY-rect.top}
    ]);

    setTimeout(()=>{
      setRipples(r=>r.filter(x=>x.id!==id));
    },1000);
  }

  return React.createElement("section",
    {className:"hr-root reveal reveal-scale",onClick:handleClick},

    React.createElement("div",{className:"hr-bg"}),

    ripples.map(r =>
      React.createElement("span",{
        key:r.id,
        className:"ripple",
        style:{left:r.x,top:r.y}
      })
    ),

    React.createElement("h1",{className:"hr-title"},"THE LAND OF ART"),
    React.createElement("p",{className:"hr-sub"},
      "Where creativity meets legacy and every moment becomes art."
    ),
    React.createElement("p",{className:"hr-sub"},
      "Where Ideas bloom into masterpieces."
    ),
    React.createElement("div",{className:"hr-btns"},
      React.createElement("a",{href:"events.html",className:"btn-primary"},"Explore Events"),
      React.createElement("a",{href:"team.html",className:"btn-secondary"},"Meet Team")
    )
  );
}

/* ================= INTRO ================= */
function Intro({ onFinish }) {
  const [fade, setFade] = React.useState(false);

  React.useEffect(() => {
    // fallback in case video doesn't end
    const timer = setTimeout(() => {
      setFade(true);
      setTimeout(onFinish, 1000);
    }, 6000);

    return () => clearTimeout(timer);
  }, []);

  return React.createElement("div", {
    className: "intro-root",
    style: {
      opacity: fade ? 0 : 1,
      transition: "opacity 1s ease"
    }
  },

    React.createElement("video", {
      className: "intro-video",
      autoPlay: true,
      muted: true,
      playsInline: true,
      preload: "auto",
      onEnded: () => {
        setFade(true);
        setTimeout(onFinish, 1000);
      }
    },
      React.createElement("source", {
        src: "intro.mp4",
        type: "video/mp4"
      })
    )
  );
}

/* ================= LANDING PAGE ================= */
function LandingPage(){

  // ✅ show intro once per session
  const [showIntro, setShowIntro] = React.useState(
    sessionStorage.getItem("seenIntro") !== "true"
  );

  /* ================= REVEAL ANIMATION ================= */
  React.useEffect(() => {

    if (showIntro) return; // wait until intro ends

    const elements = document.querySelectorAll(".reveal");

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, index) => {

        if (entry.isIntersecting) {
          entry.target.style.transitionDelay = (index % 3) * 0.12 + "s";
          entry.target.classList.add("active");
          observer.unobserve(entry.target);
        }

      });
    }, { threshold: 0.15 });

    elements.forEach(el => observer.observe(el));

    return () => observer.disconnect();

  }, [showIntro]);


  return React.createElement("div",{className:"la-root"},

    /* INTRO */
    showIntro && React.createElement(Intro,{
      onFinish: () => {
        sessionStorage.setItem("seenIntro", "true");
        setShowIntro(false);
      }
    }),
    
    /* MAIN PAGE */
    React.createElement("div",{
      className: showIntro ? "page-hidden" : "page-visible"
    },

      React.createElement(Header),
      React.createElement(Hero),
      React.createElement(AboutUs),
      React.createElement(ExploreCards),
      React.createElement(TeamPreview),
      React.createElement(FacultySection),
      React.createElement(FoundersSection),
      React.createElement(SquadSection),
      React.createElement(CallToAction),
      React.createElement(Footer)
    )
  );
}
