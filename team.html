
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team | Land of Art</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --primary:#0F2A1D;
  --cream-bg:#E8DFC8;
  --accent:#C2A96A;
  --text-main:#0F2A1D;
  --text-light:#F5F1E6;
  --border:rgba(15,42,29,0.15);
}

body{
  font-family:'Playfair Display',serif;
  background:var(--cream-bg);
  color:var(--text-main);
}

/* FORCE SAME FONT EVERYWHERE */
h1,h2,h3,p,button,a{
  font-family:'Playfair Display',serif;
}

/* NAV */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--border);
}

.nav-links a{
  margin-left:14px;
  text-decoration:none;
  color:var(--text-main);
  font-size:0.95rem;
  transition:0.2s;
}
.nav-links a:hover{
  opacity:0.7;
}

/* HERO */
.te-hero{
  text-align:center;
  padding:60px 15px;
  background:var(--primary);
  color:var(--text-light);
}

/* TABS */
.te-tabs{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:25px 0;
}
.te-tab-btn{
  padding:8px 18px;
  border-radius:20px;
  border:2px solid var(--primary);
  cursor:pointer;
  transition:0.3s;
}
.te-tab-btn.active{
  background:var(--primary);
  color:#fff;
  box-shadow:0 6px 18px rgba(15,42,29,0.25);
}
.te-tab-btn:hover{
  transform:translateY(-2px);
}

/* SECTION */
.te-section-title{
  text-align:center;
  margin:35px 0 10px;
}

/* GRID */
.team-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(160px,1fr));
  gap:16px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}
@media(max-width:600px){
  .team-grid{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:400px){
  .team-grid{
    grid-template-columns:1fr;
  }
}

/* CARD */
.team-card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}
.team-card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* IMAGE */
.team-img{
  aspect-ratio:1/1;
}
.team-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INFO */
.team-info{
  text-align:center;
  padding:10px;
}
.team-info h3{
  font-size:0.9rem;
}

/* ROLE */
.role-badge{
  display:inline-block;
  margin-top:6px;
  padding:4px 10px;
  border-radius:20px;
  background:var(--accent);
  font-size:0.75rem;
}

/* PAST FILTER */
.batch-tabs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:20px;
}
.batch-btn{
  padding:6px 14px;
  border-radius:20px;
  border:1px solid var(--primary);
  cursor:pointer;
}
.batch-btn.active{
  background:var(--primary);
  color:#fff;
}

/* MOBILE */
@media(max-width:600px){
  .team-grid{
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:12px;
  }

  .team-info h3{
    font-size:0.8rem;
  }
}
</style>
</head>

<body>
<div id="root"></div>

ReactDOM.createRoot(document.getElementById("root"))

</body>
</html>
